name: Sync from Upstream

on:
  schedule:
    - cron: '0 0 * * *' # runs once a day at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure upstream remote
        run: |
          git remote add upstream https://github.com/fmhy/edit.git 2>/dev/null \
            || git remote set-url upstream https://github.com/fmhy/edit.git

      - name: Fetch and merge upstream
        run: |
          git fetch upstream main
          # .gitattributes enforces LF, but some markdown files were committed with CRLF.
          # On Linux runners that leaves a dirty working tree and blocks merge.
          git add --renormalize .
          git diff --cached --quiet || git commit -m "Normalize line endings"
          git merge FETCH_HEAD -m "Sync from upstream"

      - name: Push to origin
        run: git push origin HEAD:main
